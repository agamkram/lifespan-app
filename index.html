<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
  />
  <meta name="theme-color" content="#0f1419" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Lifespan" />
  <meta
    name="description"
    content="Estimate your death age from age, fitness, BMI, and health habits. Evidence-based, transparent formula."
  />
  <title>Lifespan</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" type="image/png" href="apple-touch-icon.png" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  />
  <style>
    :root {
      --bg: #0f1419;
      --surface: #1a2332;
      --surface-2: #243044;
      --text: #e8edf4;
      --muted: #8b9cb3;
      --accent: #3d9cf5;
      --accent-glow: rgba(61, 156, 245, 0.18);
      --danger: #f87171;
      --warning: #f59e0b;
      --success: #4ade80;
      --elite: #c084fc;
      --border: rgba(255, 255, 255, 0.08);
      --app-gap: clamp(0.35rem, 1.2vmin, 0.55rem);
      --ctrl-gap: 0.28rem;
      --text-title: clamp(1.3rem, 4vmin, 1.7rem);
      --text-label: clamp(0.58rem, 1.5vmin, 0.68rem);
      --text-value: clamp(0.95rem, 2.4vmin, 1.15rem);
      --text-ui: clamp(0.62rem, 1.6vmin, 0.72rem);
      --text-formula: clamp(0.65rem, 1.75vmin, 0.78rem);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
    }

    body {
      height: 100%;
      overflow: hidden;
      font-family: "IBM Plex Sans", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .fit-stage {
      position: fixed;
      inset: 0;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      padding:
        max(0.2rem, env(safe-area-inset-top))
        max(0.35rem, env(safe-area-inset-right))
        max(0.2rem, env(safe-area-inset-bottom))
        max(0.35rem, env(safe-area-inset-left));
    }

    .app {
      position: relative;
      flex-shrink: 0;
      box-sizing: border-box;
      padding: 0.45rem 0.55rem 0.5rem;
      display: grid;
      gap: var(--app-gap);
      transform: scale(1);
      transform-origin: center center;
      will-change: transform;
    }

    .app:not(.is-fitted) {
      visibility: hidden;
    }

    .fit-stage--fluid {
      overflow: hidden;
      align-items: center;
      justify-content: center;
    }

    .fit-stage--fluid > .app {
      transform: none !important;
      width: 100% !important;
      max-width: 56rem;
      height: auto;
      max-height: none;
      will-change: auto;
      overflow: visible;
    }

    .app[data-layout="wide"],
    .app[data-layout="phone"] {
      grid-template-columns: 1fr;
      grid-template-rows: auto auto auto auto;
      grid-template-areas:
        "header"
        "inputs"
        "result"
        "formula";
      width: min(26rem, 100%);
      max-height: none;
    }

    header {
      grid-area: header;
      text-align: center;
    }

    header h1 {
      font-size: var(--text-title);
      font-weight: 700;
      letter-spacing: -0.03em;
    }

    header .subheader {
      font-size: var(--text-ui);
      font-weight: 500;
      color: var(--muted);
      margin-top: 0.12rem;
      letter-spacing: 0.01em;
      line-height: 1.25;
    }

    .inputs-panel {
      grid-area: inputs;
      display: flex;
      flex-direction: column;
      gap: var(--app-gap);
      width: 100%;
      flex-shrink: 0;
    }

    .result-panel {
      grid-area: result;
      background: linear-gradient(160deg, rgba(61, 156, 245, 0.14), rgba(192, 132, 252, 0.08));
      border: 1px solid rgba(61, 156, 245, 0.28);
      border-radius: 10px;
      padding: 0.5rem 0.55rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 0.35rem;
      width: 100%;
      flex-shrink: 0;
      margin-top: 0.15rem;
    }

    .result-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.3rem;
      width: 100%;
    }

    .result-stat {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.08rem;
      min-width: 0;
    }

    .result-label {
      font-size: var(--text-label);
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .result-value {
      font-size: clamp(1.05rem, 3.6vmin, 1.45rem);
      font-weight: 700;
      line-height: 1;
      letter-spacing: -0.03em;
      font-variant-numeric: tabular-nums;
    }

    .result-value--death-age {
      color: var(--text);
    }

    .result-value--death-year {
      color: var(--accent);
    }

    .result-value--remaining {
      color: var(--text);
    }

    .control {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.38rem 0.48rem 0.42rem;
      display: flex;
      flex-direction: column;
      gap: var(--ctrl-gap);
      min-width: 0;
    }

    .control--vo2 {
      background: linear-gradient(180deg, rgba(61, 156, 245, 0.1), var(--surface));
      border-color: rgba(61, 156, 245, 0.35);
      box-shadow: 0 0 0 1px rgba(61, 156, 245, 0.08) inset;
    }

    .age-sex-split {
      display: grid;
      grid-template-columns: 3fr 1fr;
      gap: 0.4rem;
      align-items: end;
    }

    .age-sex-age,
    .age-sex-sex {
      min-width: 0;
    }

    .bmi-weight-split {
      display: grid;
      grid-template-columns: 3fr 1fr;
      gap: 0.4rem;
      align-items: end;
    }

    .bmi-weight-slider,
    .bmi-readout {
      min-width: 0;
    }

    .bmi-readout {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      gap: 0.12rem;
      text-align: center;
    }

    .bmi-readout-value {
      display: flex;
      align-items: baseline;
      justify-content: center;
      gap: 0.18rem;
      line-height: 1;
    }

    .bmi-readout-label {
      font-size: var(--text-label);
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .bmi-readout-number {
      font-size: clamp(0.9rem, 2.2vmin, 1.05rem);
      font-weight: 700;
      font-variant-numeric: tabular-nums;
    }

    .bmi-readout .badge {
      font-size: clamp(0.48rem, 1.1vmin, 0.56rem);
      padding: 0.1rem 0.22rem;
      max-width: 100%;
      white-space: normal;
      line-height: 1.15;
    }

    .control--age-sex .control-value {
      font-size: clamp(1.15rem, 3.2vmin, 1.4rem);
      color: var(--accent);
    }

    .segmented--sex {
      flex-direction: column;
    }

    .segmented--sex .seg-btn {
      flex: 1;
      min-height: 1.55rem;
      font-size: clamp(0.58rem, 1.4vmin, 0.68rem);
      padding: 0.28rem 0.12rem;
    }

    .control-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.35rem;
      min-width: 0;
    }

    .control-label {
      font-size: var(--text-label);
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.04em;
      white-space: nowrap;
    }

    .control-value {
      font-size: var(--text-value);
      font-weight: 700;
      color: var(--text);
      font-variant-numeric: tabular-nums;
      letter-spacing: -0.02em;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0.12rem 0.42rem;
      border-radius: 999px;
      font-size: var(--text-ui);
      font-weight: 700;
      line-height: 1.2;
      white-space: nowrap;
      border: 1px solid transparent;
    }

    .badge--poor { background: rgba(248, 113, 113, 0.18); color: #fca5a5; border-color: rgba(248, 113, 113, 0.35); }
    .badge--below { background: rgba(251, 146, 60, 0.18); color: #fdba74; border-color: rgba(251, 146, 60, 0.35); }
    .badge--average { background: rgba(139, 156, 179, 0.18); color: #cbd5e1; border-color: rgba(139, 156, 179, 0.35); }
    .badge--above { background: rgba(61, 156, 245, 0.18); color: #93c5fd; border-color: rgba(61, 156, 245, 0.35); }
    .badge--excellent { background: rgba(74, 222, 128, 0.18); color: #86efac; border-color: rgba(74, 222, 128, 0.35); }
    .badge--elite { background: rgba(192, 132, 252, 0.18); color: #d8b4fe; border-color: rgba(192, 132, 252, 0.35); }

    .badge--underweight { background: rgba(245, 158, 11, 0.18); color: #fcd34d; border-color: rgba(245, 158, 11, 0.4); }
    .badge--normal { background: rgba(74, 222, 128, 0.18); color: #86efac; border-color: rgba(74, 222, 128, 0.35); }
    .badge--overweight { background: rgba(251, 191, 36, 0.16); color: #fde68a; border-color: rgba(251, 191, 36, 0.35); }
    .badge--obese1 { background: rgba(251, 146, 60, 0.18); color: #fdba74; border-color: rgba(251, 146, 60, 0.35); }
    .badge--obese2 { background: rgba(248, 113, 113, 0.18); color: #fca5a5; border-color: rgba(248, 113, 113, 0.35); }
    .badge--obese3 { background: rgba(239, 68, 68, 0.22); color: #fecaca; border-color: rgba(245, 158, 11, 0.45); }

    .slider-row {
      width: 100%;
    }

    input[type="range"] {
      display: block;
      width: 100%;
      max-width: 100%;
      margin: 0;
      accent-color: var(--accent);
      cursor: pointer;
      height: 1.15rem;
    }

    .control--vo2 input[type="range"] {
      accent-color: #60a5fa;
    }

    @media (pointer: coarse) {
      input[type="range"] {
        min-height: 36px;
      }
    }

    .segmented {
      display: flex;
      gap: 2px;
      background: var(--surface-2);
      border-radius: 8px;
      padding: 2px;
    }

    .seg-btn {
      flex: 1;
      min-width: 0;
      border: none;
      background: transparent;
      color: var(--muted);
      font: inherit;
      font-size: var(--text-ui);
      font-weight: 600;
      padding: 0.32rem 0.2rem;
      border-radius: 6px;
      cursor: pointer;
      line-height: 1.15;
      transition: background 0.15s, color 0.15s, box-shadow 0.15s;
    }

    .seg-btn[aria-pressed="true"] {
      background: var(--accent);
      color: #061018;
      box-shadow: 0 1px 6px rgba(61, 156, 245, 0.35);
    }

    .segmented--sex .seg-btn[aria-pressed="true"] {
      font-weight: 700;
    }

    .formula-wrap {
      grid-area: formula;
      flex-shrink: 0;
      width: 100%;
      overflow: hidden;
      text-align: center;
      margin-top: -0.2rem;
      padding: 0.05rem 0 0.05rem;
    }

    .formula {
      display: inline-block;
      max-width: 100%;
      font-size: var(--text-formula);
      color: var(--muted);
      line-height: 1.35;
      padding: 0 0.2rem;
      opacity: 0.92;
      white-space: nowrap;
    }

    @media (max-width: 767px) {
      .fit-stage {
        align-items: flex-start;
        padding:
          calc(env(safe-area-inset-top, 0px) + 0.1rem)
          max(0.3rem, env(safe-area-inset-right))
          calc(env(safe-area-inset-bottom, 0px) + 0.35rem)
          max(0.3rem, env(safe-area-inset-left));
      }

      .app {
        transform-origin: top center;
      }
    }

    /* iPad / touch wide: center scale (phone uses top-origin; don't use that here) */
    @media (min-width: 768px) and (max-width: 1366px) and (hover: none),
      (min-width: 768px) and (max-width: 1366px) and (pointer: coarse) {
      .fit-stage {
        align-items: center;
        justify-content: center;
        padding:
          max(0.35rem, env(safe-area-inset-top, 0px))
          max(0.45rem, env(safe-area-inset-right, 0px))
          max(0.35rem, env(safe-area-inset-bottom, 0px))
          max(0.45rem, env(safe-area-inset-left, 0px));
      }

      .app {
        transform-origin: center center;
      }
    }

    @media (min-width: 768px) and (max-height: 700px) {
      :root {
        --app-gap: 0.3rem;
      }

      .control {
        padding: 0.3rem 0.4rem 0.34rem;
      }
    }
  </style>
</head>
<body>
  <div class="fit-stage" id="fit-stage">
    <div class="app" id="app">
      <header>
        <h1>Lifespan</h1>
        <p class="subheader">U.S. period life expectancy · NCHS 2023</p>
      </header>

      <div class="inputs-panel">
        <div class="control control--age-sex">
          <div class="age-sex-split">
            <div class="age-sex-age">
              <div class="control-head">
                <span class="control-label">Age</span>
                <span class="control-value" id="age-value">42</span>
              </div>
              <div class="slider-row">
                <input type="range" id="age-slider" min="16" max="100" value="42" step="1" aria-label="Age" />
              </div>
            </div>
            <div class="age-sex-sex">
              <div class="segmented segmented--sex" role="group" aria-label="Sex">
                <button type="button" class="seg-btn" data-sex="male" aria-pressed="true">Male</button>
                <button type="button" class="seg-btn" data-sex="female" aria-pressed="false">Female</button>
              </div>
            </div>
          </div>
        </div>

        <div class="control control--height">
          <div class="control-head">
            <span class="control-label">Height</span>
            <span class="control-value" id="height-value">5′9″</span>
          </div>
          <div class="slider-row">
            <input type="range" id="height-slider" min="48" max="84" value="69" step="1" aria-label="Height" />
          </div>
        </div>

        <div class="control control--bmi">
          <div class="bmi-weight-split">
            <div class="bmi-weight-slider">
              <div class="control-head">
                <span class="control-label">Weight</span>
                <span class="control-value" id="weight-value">168 lb</span>
              </div>
              <div class="slider-row">
                <input type="range" id="weight-slider" min="50" max="400" value="168" step="1" aria-label="Weight in pounds" />
              </div>
            </div>
            <div class="bmi-readout" aria-live="polite">
              <span class="bmi-readout-value">
                <span class="bmi-readout-label">BMI</span>
                <span class="bmi-readout-number" id="bmi-value">24.8</span>
              </span>
              <span class="badge badge--normal" id="bmi-badge">Normal</span>
            </div>
          </div>
        </div>

        <div class="control control--vo2">
          <div class="control-head">
            <span class="control-label">VO₂ Max (ml/kg/min)</span>
            <span class="control-value" id="vo2-value">38</span>
            <span class="badge badge--average" id="vo2-badge">Average</span>
          </div>
          <div class="slider-row">
            <input type="range" id="vo2-slider" min="18" max="70" value="38" step="1" aria-label="VO2 max" />
          </div>
        </div>

        <div class="control">
          <div class="control-head">
            <span class="control-label">Smoking</span>
          </div>
          <div class="segmented" role="group" aria-label="Smoking status" data-field="smoking">
            <button type="button" class="seg-btn" data-value="never" aria-pressed="true">Never</button>
            <button type="button" class="seg-btn" data-value="former" aria-pressed="false">Former</button>
            <button type="button" class="seg-btn" data-value="current" aria-pressed="false">Current</button>
          </div>
        </div>

        <div class="control">
          <div class="control-head">
            <span class="control-label">Blood pressure</span>
          </div>
          <div class="segmented" role="group" aria-label="Blood pressure" data-field="bp">
            <button type="button" class="seg-btn" data-value="optimal" aria-pressed="false">Optimal</button>
            <button type="button" class="seg-btn" data-value="normal" aria-pressed="true">Normal</button>
            <button type="button" class="seg-btn" data-value="elevated" aria-pressed="false">Elevated</button>
            <button type="button" class="seg-btn" data-value="high" aria-pressed="false">High</button>
          </div>
        </div>

        <div class="control">
          <div class="control-head">
            <span class="control-label">Diabetes</span>
          </div>
          <div class="segmented" role="group" aria-label="Diabetes status" data-field="diabetes">
            <button type="button" class="seg-btn" data-value="none" aria-pressed="true">None</button>
            <button type="button" class="seg-btn" data-value="prediabetes" aria-pressed="false">Prediabetes</button>
            <button type="button" class="seg-btn" data-value="type2" aria-pressed="false">T2 managed</button>
          </div>
        </div>

        <div class="control">
          <div class="control-head">
            <span class="control-label">Diet quality</span>
          </div>
          <div class="segmented" role="group" aria-label="Diet quality" data-field="diet">
            <button type="button" class="seg-btn" data-value="excellent" aria-pressed="false">Excellent</button>
            <button type="button" class="seg-btn" data-value="good" aria-pressed="false">Good</button>
            <button type="button" class="seg-btn" data-value="average" aria-pressed="true">Average</button>
            <button type="button" class="seg-btn" data-value="poor" aria-pressed="false">Poor</button>
          </div>
        </div>
      </div>

      <section class="result-panel" aria-live="polite">
        <div class="result-grid">
          <div class="result-stat">
            <span class="result-label">Remaining</span>
            <span class="result-value result-value--remaining" id="remaining-years">—</span>
          </div>
          <div class="result-stat">
            <span class="result-label">Lifespan</span>
            <span class="result-value result-value--death-age" id="death-age">—</span>
          </div>
          <div class="result-stat">
            <span class="result-label">Last year</span>
            <span class="result-value result-value--death-year" id="death-year">—</span>
          </div>
        </div>
      </section>

      <div class="formula-wrap">
        <p class="formula" id="formula" aria-live="polite"></p>
      </div>
    </div>
  </div>

  <script src="fit-to-screen.js"></script>
  <script src="estimator.js"></script>
  <script>
    (function () {
      const state = {
        age: 42,
        sex: "male",
        heightIn: 69,
        weightLbs: 168,
        vo2: 38,
        smoking: "never",
        bp: "normal",
        diabetes: "none",
        diet: "average",
      };

      const ageSlider = document.getElementById("age-slider");
      const heightSlider = document.getElementById("height-slider");
      const weightSlider = document.getElementById("weight-slider");
      const vo2Slider = document.getElementById("vo2-slider");
      const ageValue = document.getElementById("age-value");
      const heightValue = document.getElementById("height-value");
      const weightValue = document.getElementById("weight-value");
      const vo2Value = document.getElementById("vo2-value");
      const bmiValue = document.getElementById("bmi-value");
      const vo2Badge = document.getElementById("vo2-badge");
      const bmiBadge = document.getElementById("bmi-badge");
      const remainingYearsEl = document.getElementById("remaining-years");
      const deathAgeEl = document.getElementById("death-age");
      const deathYearEl = document.getElementById("death-year");
      const formulaEl = document.getElementById("formula");
      const formulaWrap = document.querySelector(".formula-wrap");

      const VO2_BADGE_CLASS = {
        Poor: "badge--poor",
        "Below Average": "badge--below",
        Average: "badge--average",
        "Above Average": "badge--above",
        Excellent: "badge--excellent",
        Elite: "badge--elite",
      };

      const BMI_BADGE_CLASS = {
        underweight: "badge--underweight",
        normal: "badge--normal",
        overweight: "badge--overweight",
        obese1: "badge--obese1",
        obese2: "badge--obese2",
        obese3: "badge--obese3",
      };

      function formatHeight(inches) {
        const ft = Math.floor(inches / 12);
        const inch = inches % 12;
        return `${ft}′${inch}″`;
      }

      function setBadge(el, label, classKey, classMap) {
        el.textContent = label;
        el.className = `badge ${classMap[classKey] || "badge--average"}`;
      }

      function getSegmentValue(group) {
        const pressed = group.querySelector('.seg-btn[aria-pressed="true"]');
        return pressed ? pressed.dataset.value : null;
      }

      function bindSegmentedGroups() {
        document.querySelectorAll(".segmented[data-field]").forEach((group) => {
          group.addEventListener("click", (event) => {
            const btn = event.target.closest(".seg-btn");
            if (!btn || !group.contains(btn)) return;
            group.querySelectorAll(".seg-btn").forEach((b) => {
              b.setAttribute("aria-pressed", b === btn ? "true" : "false");
            });
            state[group.dataset.field] = btn.dataset.value;
            update();
          });
        });

        document.querySelectorAll(".segmented--sex .seg-btn").forEach((btn) => {
          btn.addEventListener("click", () => {
            document.querySelectorAll(".segmented--sex .seg-btn").forEach((b) => {
              b.setAttribute("aria-pressed", b === btn ? "true" : "false");
            });
            state.sex = btn.dataset.sex;
            update();
          });
        });
      }

      function fitFormulaLine() {
        if (!formulaWrap || !formulaEl) return;
        formulaEl.style.fontSize = "";
        let size = parseFloat(getComputedStyle(formulaEl).fontSize);
        const minSize = 6;
        while (formulaEl.scrollWidth > formulaWrap.clientWidth && size > minSize) {
          size -= 0.25;
          formulaEl.style.fontSize = `${size}px`;
        }
      }

      function update() {
        const result = DeathEstimator.estimate(state);

        ageValue.textContent = result.age;
        heightValue.textContent = formatHeight(result.heightIn);
        weightValue.textContent = `${result.weightLbs} lb`;
        vo2Value.textContent = result.vo2;
        bmiValue.textContent = result.bmi.toFixed(1);
        setBadge(vo2Badge, result.vo2Category, result.vo2Category, VO2_BADGE_CLASS);
        setBadge(bmiBadge, result.bmiCategory.label, result.bmiCategory.key, BMI_BADGE_CLASS);

        remainingYearsEl.textContent = `${result.remainingYears.toFixed(1)} yrs`;
        deathAgeEl.textContent = `${result.deathAge} yrs`;
        deathYearEl.textContent = result.deathYear;
        formulaEl.textContent = result.formula;
        fitFormulaLine();
        fit.scheduleFitToScreen(true);
      }

      ageSlider.addEventListener("input", () => {
        state.age = Number(ageSlider.value);
        update();
      });

      heightSlider.addEventListener("input", () => {
        state.heightIn = Number(heightSlider.value);
        update();
      });

      vo2Slider.addEventListener("input", () => {
        state.vo2 = Number(vo2Slider.value);
        update();
      });

      weightSlider.addEventListener("input", () => {
        state.weightLbs = Number(weightSlider.value);
        update();
      });

      // Phone: unchanged (full width, scale ≤1).
      // iPad: same 416 artboard as Mac card, but scale may exceed 1 (proportional).
      // Keep layout name "wide" so existing grid CSS still applies (no "tablet" name).
      function isDesktopPointer() {
        return (
          navigator.maxTouchPoints === 0 &&
          window.matchMedia("(hover: hover) and (pointer: fine)").matches
        );
      }

      const fit = FitToScreen.create({
        stage: "fit-stage",
        app: "app",
        phoneMaxWidth: 767,
        wideAppWidth: 416,
        getLayoutName(availW) {
          return availW <= 767 ? "phone" : "wide";
        },
        useScaleForLayout() {
          return true;
        },
        getAppLayoutWidth(availW, layout) {
          if (layout === "phone") return availW;
          return 416;
        },
        getCapScaleAtOne(layout, availW) {
          // Only touch iPads (wide + not desktop pointer) scale above 1.
          if (layout === "wide" && !isDesktopPointer() && availW > 767) {
            return false;
          }
          return true;
        },
        onFit() {
          fitFormulaLine();
        },
      });

      bindSegmentedGroups();
      fit.bindViewportListeners();
      update();
      fit.bootLayout();
    })();
  </script>

    window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
  </script>
